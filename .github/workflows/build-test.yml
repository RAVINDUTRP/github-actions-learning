name: Build and Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'sample-app/**'
      - '.github/workflows/build-test.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    # Task 5: Set environment variables for testing
    env:
      NODE_ENV: test
      LOG_LEVEL: debug
    
    # Task 7: Matrix Strategy
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Task 5: Add a step to print these variables to the logs
      - name: Print environment variables
        run: |
          echo "Environment: ${{ env.NODE_ENV }}"
          echo "LOG_LEVEL: ${{ env.LOG_LEVEL }}"
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'sample-app/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./sample-app
        run: npm ci
      
      - name: Run linter
        working-directory: ./sample-app
        run: npm run lint
        continue-on-error: true
      
      - name: Build application
        working-directory: ./sample-app
        run: npm run build
      
      - name: Run tests
        working-directory: ./sample-app
        run: npm test
      
      - name: Upload coverage reports
        if: matrix.node-version == '18.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: sample-app/coverage/
          retention-days: 30
      
      - name: Check coverage
        if: always()
        working-directory: ./sample-app
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "✅ Coverage report generated"
          else
            echo "⚠️ No coverage report found"
          fi

      # Task 8: Create and upload artifact
      - name: Create artifact
        run: echo "Build output from node ${{ matrix.node-version }}" > output.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.node-version }}
          path: output.txt

  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'sample-app/package-lock.json'
      
      - working-directory: ./sample-app
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./sample-app
        run: npm run lint
        continue-on-error: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    
    steps:
      - name: Print test results
        run: |
          echo "🎯 Test Run Summary"
          echo "==================="
          echo "✅ All tests completed"

  # Task 8: New job to download and verify artifact
  download-artifact:
    name: Download and Verify Artifact
    runs-on: ubuntu-latest
    needs: [build-and-test]

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output-18.x

      - name: Verify artifact contents
        run: |
          echo "📦 Downloaded artifact contents:"
          cat output.txt